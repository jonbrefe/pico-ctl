name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-all python3-setuptools dh-python debhelper devscripts

      - name: Build .deb package
        run: |
          VERSION=$(python3 setup.py --version)
          mkdir -p build_deb/pico-ctl-${VERSION}
          rsync -a --exclude=build_deb . build_deb/pico-ctl-${VERSION}/
          cd build_deb/pico-ctl-${VERSION}
          dpkg-buildpackage -us -uc -b
          cd ..
          mv *.deb ../

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build python3-devel python3-setuptools

      - name: Build .rpm package
        run: |
          VERSION=$(python3 setup.py --version)

          # Create source tarball
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          tar czf ~/rpmbuild/SOURCES/pico-ctl-${VERSION}.tar.gz \
            --transform "s,^,pico-ctl-${VERSION}/," \
            pico_ctl.py pico_serial.py setup.py requirements.txt README.md LICENSE pico-ctl.spec

          cp pico-ctl.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/pico-ctl.spec

      - name: Copy RPM to workspace
        run: cp ~/rpmbuild/RPMS/noarch/*.rpm .

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: '*.rpm'

  release:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-package/*.deb
            rpm-package/*.rpm
          generate_release_notes: true
